  <!-- FORGOT PASSWORD -->
  <div class="page-wrapper">
    <div class="card">
      <a href="login-page.html" class="back-button" onclick="event.preventDefault(); window.location.replace('login-page.html');">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M19 12H5M12 5l-7 7 7 7" />
        </svg>
        Back to Login
      </a>

      <div class="card-header">
        <h1>Forgot Password</h1>
        <p>Enter your registered email address. We'll send you a 6-digit verification code.</p>
      </div>

      <form id="forgotForm">
        <div class="form-group" id="fieldEmail">
          <label for="email">Email Address</label>
          <input type="email" id="email" autocomplete="email" placeholder="name@company.com" />
          <div class="error-message" id="emailError">Enter a valid email address</div>
        </div>

        <button type="submit" class="btn-primary" id="btnSubmit">Send Verification Code</button>
      </form>

      <div class="status-msg" id="statusMsg"></div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://capable-delight-production-cd5e.up.railway.app';
    const params = new URLSearchParams(window.location.search);
    const role = params.get("role") || localStorage.getItem("userRole") || "buyer";

    // Fetch with timeout — shows friendly message if Render is cold-starting
    async function fetchWithTimeout(url, options = {}, timeoutMs = 20000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        return await fetch(url, { ...options, signal: controller.signal });
      } catch (err) {
        if (err.name === 'AbortError') {
          throw new Error('Server is taking too long to respond. It may be waking up — please try again in a moment.');
        }
        throw err;
      } finally {
        clearTimeout(timer);
      }
    }

    function toggleMenu() {
      document.getElementById("navLinks").classList.toggle("open");
      document.getElementById("hamburger").classList.toggle("active");
    }

    document.getElementById("forgotForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const emailField = document.getElementById("fieldEmail");
      const emailInput = document.getElementById("email");
      const emailVal = emailInput.value.trim();
      const btn = document.getElementById("btnSubmit");
      const statusMsg = document.getElementById("statusMsg");
      const emailError = document.getElementById("emailError");

      // Reset
      emailField.classList.remove("error");
      statusMsg.textContent = "";
      statusMsg.className = "status-msg";

      // Validate
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailVal || !emailRegex.test(emailVal)) {
        emailField.classList.add("error");
        emailError.textContent = "Enter a valid email address";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Sending...";
      statusMsg.textContent = "Connecting to server…";
      statusMsg.className = "status-msg";

      try {
        const res = await fetchWithTimeout(`${API_BASE}/api/auth/forgot-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: emailVal, role: role }),
        });
        const data = await res.json();

        if (!res.ok && !data.success) {
          statusMsg.textContent = data.message || "Something went wrong.";
          statusMsg.className = "status-msg error";
          btn.disabled = false;
          btn.textContent = "Send Verification Code";
          return;
        }

        // Success — save context to localStorage and go to verify OTP page
        localStorage.setItem('bm_temp_verification', JSON.stringify({ email: emailVal, role: role }));
        window.location.replace(`verify-otp.html?email=${encodeURIComponent(emailVal)}&role=${encodeURIComponent(role)}`);

      } catch (err) {
        statusMsg.textContent = err.message || "Network error. Please check your connection.";
        statusMsg.className = "status-msg error";
        btn.disabled = false;
        btn.textContent = "Send Verification Code";
      }
    });
  </script>
